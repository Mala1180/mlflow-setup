services:

  mlflow-db:
    image: postgres:15
    container_name: ${POSTGRES_CONTAINER}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 2s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_STORAGE_USE_HTTPS: false
    command: server --console-address ":9001" /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/minio/health/live"]
      interval: 2s
      timeout: 10s
      retries: 10

  minio-setup:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./minio/setup.sh:/setup.sh
      - .env:/.env
    entrypoint: /bin/sh
    command: -c "chmod +x /setup.sh && /setup.sh"


  mlflow:
    build:
      context: .
    container_name: mlflow-server
    restart: always
    depends_on:
      mlflow-db: 
        condition: service_healthy
      # minio-setup:
      #   condition: service_completed_successfully
    environment:
      MLFLOW_FLASK_SERVER_SECRET_KEY: ${MLFLOW_SECRET_KEY}
      MLFLOW_AUTH_CONFIG_PATH: mlflow/server/auth/basic_auth.ini
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_CONTAINER: ${POSTGRES_CONTAINER}
      MLFLOW_ADMIN_USER: ${MLFLOW_ADMIN_USER}
      MLFLOW_ADMIN_PASSWORD: ${MLFLOW_ADMIN_PASSWORD}
    ports:
      - "4000:5000"
    command: >
      poetry run mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_CONTAINER}:${POSTGRES_PORT}/${POSTGRES_DB}
      --default-artifact-root s3://${MINIO_MLFLOW_BUCKET}
      --host 0.0.0.0
      --app-name basic-auth
      
volumes:
  postgres_data: { }
  minio_data: { }
